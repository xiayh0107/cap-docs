name: reference

on:
  pull_request:
  push:
    branches: [main]

jobs:
  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Run unit tests
        run: python -m unittest discover reference/python/tests
      - name: Run fixture script
        run: python reference/python/scripts/validate_fixtures.py
