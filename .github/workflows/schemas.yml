name: schemas

on:
  pull_request:
  push:
    branches: [main]

jobs:
  json-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install schema validation dependencies
        run: python -m pip install 'jsonschema>=4.18'
      - name: Parse schema and fixture JSON
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          for path in Path('schemas').rglob('*.json'):
              json.loads(path.read_text(encoding='utf-8'))
              print(f'json ok: {path}')

          for path in Path('fixtures').rglob('*.json'):
              json.loads(path.read_text(encoding='utf-8'))
              print(f'json ok: {path}')
          PY
      - name: Validate schema-backed fixtures
        run: python reference/python/scripts/validate_schema_fixtures.py
