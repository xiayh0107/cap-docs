name: core-draft

on:
  pull_request:
  push:
    branches: [main]

jobs:
  core-draft-checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install schema validation dependencies
        run: python -m pip install 'jsonschema>=4.18'
      - name: Validate Core draft fixtures
        run: python reference/python/scripts/validate_fixtures.py --scope core --report core-draft-fixtures.json
      - name: Generate Core draft conformance report
        run: python reference/python/scripts/validate_core_fixtures.py --report core-conformance-report.json
      - name: Validate Core draft conformance report schema
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          from jsonschema import Draft202012Validator

          schema = json.loads(Path('schemas/core/cap.core.conformance_report.v1.schema.json').read_text(encoding='utf-8'))
          report = json.loads(Path('core-conformance-report.json').read_text(encoding='utf-8'))
          Draft202012Validator.check_schema(schema)
          errors = sorted(Draft202012Validator(schema).iter_errors(report), key=lambda error: list(error.absolute_path))
          if errors:
              for error in errors:
                  print(error.message)
              raise SystemExit(1)
          print('core conformance report schema ok')
          PY
      - name: Core renderer smoke test
        run: |
          python - <<'PY'
          from pathlib import Path
          import sys

          root = Path('.').resolve()
          sys.path.insert(0, str(root / 'reference' / 'python'))
          from cap_core import CORE_FIXTURE_NAMES, load_core_fixture, render_review_summary

          for name in CORE_FIXTURE_NAMES:
              summary = render_review_summary(load_core_fixture(root, name))
              assert summary.startswith('CAP-Core review summary\n'), name
              assert 'Digest view:' in summary, name
              print(f'renderer ok: {name}')
          PY
      - name: Upload Core draft reports
        uses: actions/upload-artifact@v4
        with:
          name: core-draft-reports
          path: |
            core-draft-fixtures.json
            core-conformance-report.json
